<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video con sonido</title>
</head>
<style>
        body {
            margin: 0;
            padding: 0;
            background-color: black; /* Establece el fondo en negro */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Hace que el contenido ocupe toda la altura de la ventana del navegador */
        }

        video {
            max-width: 40%; /* Ajusta el tamaño máximo del video al ancho de la ventana */
            height: auto; /* Permite que el video mantenga su proporción de aspecto */
        }
    </style>
<body>
    <video width="640" height="360" controls autoplay loop playsinline>
        <source src="My_video.mp4" type="video/mp4">
        <source src="tu_video.ogg" type="video/ogg">
        Tu navegador no admite el elemento de vídeo.
    </video>
</body>
</html>
